name: Global Schedule Handler CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, user-service, schedule-service, sharing-service]

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -f ${{ matrix.service }}/pom.xml clean package -DskipTests

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest ${{ matrix.service }}
        # docker push ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}:latest

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Vercel CLI
      run: npm install --global vercel
    - name: Deploy to Vercel
      run: vercel --token ${{ secrets.VERCEL_TOKEN }} --confirm --prod
      working-directory: ./frontend
      env:
        VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
