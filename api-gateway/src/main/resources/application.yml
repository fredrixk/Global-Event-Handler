server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/users/**
        - id: schedule-service
          uri: ${SCHEDULE_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/schedules/**
        - id: sharing-service
          uri: ${SHARING_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/sharing/**
