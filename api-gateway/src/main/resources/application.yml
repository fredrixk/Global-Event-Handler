server:
  port: 8080

spring:
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://user-service:8081}
          predicates:
            - Path=/api/users/**
        - id: schedule-service
          uri: ${SCHEDULE_SERVICE_URL:http://schedule-service:8082}
          predicates:
            - Path=/api/schedules/**
        - id: sharing-service
          uri: ${SHARING_SERVICE_URL:http://sharing-service:8083}
          predicates:
            - Path=/api/sharing/**
